name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x, 25.x]
        platform:
        - os: ubuntu-latest
          shell: bash
        - os: macos-latest
          shell: bash
        - os: windows-latest
          shell: bash
        - os: windows-latest
          shell: powershell
      fail-fast: false

    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2026-02-22T11%3A37%3A25.657000Z@time-machines-npm.sealsecurity.io/
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Use Nodejs ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm test -- -c -t0
